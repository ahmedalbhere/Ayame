  <ellipse cx="50" cy="35" rx="18" ry="14" fill="#6B8E23" />
  
  <!-- العيون -->
  <circle cx="42" cy="33" r="4" fill="white" />
  <circle cx="58" cy="33" r="4" fill="white" />
  <circle cx="44" cy="33" r="2" fill="black" />
  <circle cx="60" cy="33" r="2" fill="black" />
  
  <!-- ابتسامة -->
  <path d="M44 42 Q50 50 56 42" stroke="#3E2723" stroke-width="2" fill="none" stroke-linecap="round" />
  
  <!-- غطاء عيد ميلاد مثلث -->
  <polygon points="50,15 35,38 65,38" fill="#FF4500" />
  <circle cx="50" cy="15" r="4" fill="#FFD700" />
  
  <!-- خدود وردية -->
  <circle cx="38" cy="45" r="3" fill="#FF9999" opacity="0.7" />
  <circle cx="62" cy="45" r="3" fill="#FF9999" opacity="0.7" />
  
  <!-- الأرجل -->
  <ellipse cx="28" cy="65" rx="8" ry="5" fill="#556B2F" />
